name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release'
        required: true
        type: string
      release_title:
        description: 'Release title (defaults to tag)'
        required: false
        type: string
      prerelease:
        description: 'Whether to mark the release as a prerelease'
        required: true
        type: boolean
        default: true
      commit:
        description: 'Commit sha to build from (optional)'
        required: false
        type: string

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libatk1.0-dev \
            libgdk-pixbuf2.0-dev libcairo2-dev libpango1.0-dev libwayland-dev pkg-config
      - run: rustup toolchain install stable --profile minimal
      - run: cargo test --release

  prepare:
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.info.outputs.version }}
      tag: ${{ steps.info.outputs.tag }}
      title: ${{ steps.info.outputs.title }}
      prerelease: ${{ steps.info.outputs.prerelease }}
      commit: ${{ steps.info.outputs.commit }}
      is_push_main: ${{ steps.info.outputs.is_push_main }}
      needs_validation: ${{ steps.info.outputs.needs_validation }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine build info
        id: info
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual trigger
            TAG="${{ github.event.inputs.tag }}"
            # Ensure tag starts with 'v'
            if [[ ! "$TAG" =~ ^v[0-9] ]]; then
              TAG="v$TAG"
            fi
            TITLE="${{ github.event.inputs.release_title }}"
            if [ -z "$TITLE" ]; then
              TITLE="$TAG"
            fi
            PRERELEASE="${{ github.event.inputs.prerelease }}"
            COMMIT="${{ github.event.inputs.commit }}"
            VERSION="${TAG#v}"
            IS_PUSH_MAIN="false"
            NEEDS_VALIDATION="true"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tag push
            TAG="${{ github.ref_name }}"
            TITLE="$TAG"
            PRERELEASE="false"
            COMMIT=""
            VERSION="${TAG#v}"
            IS_PUSH_MAIN="false"
            NEEDS_VALIDATION="true"
          else
            # Push to main - create dev version
            CURRENT_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="v${CURRENT_VERSION}-dev.${SHORT_SHA}"
            TITLE="$TAG"
            PRERELEASE="true"
            COMMIT=""
            VERSION="${CURRENT_VERSION}-dev.${SHORT_SHA}"
            IS_PUSH_MAIN="true"
            NEEDS_VALIDATION="false"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "is_push_main=$IS_PUSH_MAIN" >> "$GITHUB_OUTPUT"
          echo "needs_validation=$NEEDS_VALIDATION" >> "$GITHUB_OUTPUT"
      - name: Checkout specific commit
        if: ${{ steps.info.outputs.commit != '' }}
        run: git checkout ${{ steps.info.outputs.commit }}
      - name: Update Cargo.toml version for dev builds
        if: ${{ steps.info.outputs.is_push_main == 'true' }}
        run: |
          sed -i 's/^version = "[^"]*"/version = "${{ steps.info.outputs.version }}"/' Cargo.toml
          cargo update --workspace

  validate:
    needs: prepare
    if: ${{ needs.prepare.outputs.needs_validation == 'true' }}
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout specific commit
        if: ${{ needs.prepare.outputs.commit != '' }}
        run: git checkout ${{ needs.prepare.outputs.commit }}
      - name: Update Cargo.toml version for dev builds
        if: ${{ needs.prepare.outputs.is_push_main == 'true' }}
        run: |
          sed -i 's/^version = "[^"]*"/version = "${{ needs.prepare.outputs.version }}"/' Cargo.toml
          cargo update --workspace
      - uses: michaelklishin/rust-build-package-release-action@v1
        id: validate
        with:
          command: validate-version
          tag: ${{ needs.prepare.outputs.tag }}
          expected-version: ${{ needs.prepare.outputs.version }}

  build-x86_64:
    needs: [prepare, validate]
    if: ${{ always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout specific commit
        if: ${{ needs.prepare.outputs.commit != '' }}
        run: git checkout ${{ needs.prepare.outputs.commit }}
      - name: Update Cargo.toml version for dev builds
        if: ${{ needs.prepare.outputs.is_push_main == 'true' }}
        run: |
          sed -i 's/^version = "[^"]*"/version = "${{ needs.prepare.outputs.version }}"/' Cargo.toml
          cargo update --workspace
      - run: rustup toolchain install stable --profile minimal
      - name: Set archive name
        id: archive_name
        run: |
          echo "name=gamut-${{ needs.prepare.outputs.version }}-x86_64.tar.gz" >> $GITHUB_OUTPUT
      - uses: michaelklishin/rust-build-package-release-action@v1
        id: build
        with:
          command: release-linux
          target: x86_64-unknown-linux-gnu
          locked: 'true'
          archive: 'true'
          pre-build: |
            sudo apt-get update && \
            sudo apt-get install -y libglib2.0-dev libgtk-3-dev libatk1.0-dev \
              libgdk-pixbuf2.0-dev libcairo2-dev libpango1.0-dev libwayland-dev pkg-config
      - name: Rename binary and archive
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          ARCHIVE_NAME="${{ steps.archive_name.outputs.name }}"
          # Find original files
          ORIGINAL_TAR=$(ls *.tar.gz | grep -v "$ARCHIVE_NAME" | head -1)
          ORIGINAL_SHA=$(ls *.sha256 2>/dev/null | head -1)
          # For dev builds, extract, rename binary, and re-archive
          if [ "${{ needs.prepare.outputs.is_push_main }}" == "true" ]; then
            mkdir -p tmp && tar xzf "$ORIGINAL_TAR" -C tmp
            mv tmp/gamut "tmp/gamut-${{ needs.prepare.outputs.version }}-x86_64-unknown-linux-gnu"
            tar czf "$ARCHIVE_NAME" -C tmp .
            rm -rf tmp "$ORIGINAL_TAR"
          else
            mv "$ORIGINAL_TAR" "$ARCHIVE_NAME" 2>/dev/null || true
          fi
          # Clean up bare binary and rename checksum
          rm -f gamut gamut.d
          rm -f *.sha256 2>/dev/null || true
          sha256sum "$ARCHIVE_NAME" > "$ARCHIVE_NAME.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: x86_64-unknown-linux-gnu
          path: |
            target/x86_64-unknown-linux-gnu/release/*.tar.gz
            target/x86_64-unknown-linux-gnu/release/*.sha256

  build-aarch64:
    needs: [prepare, validate]
    if: ${{ always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    timeout-minutes: 30
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout specific commit
        if: ${{ needs.prepare.outputs.commit != '' }}
        run: git checkout ${{ needs.prepare.outputs.commit }}
      - name: Set archive name
        id: archive_name
        run: |
          echo "name=gamut-${{ needs.prepare.outputs.version }}-aarch64.tar.gz" >> $GITHUB_OUTPUT
      - run: rustup toolchain install stable --profile minimal
      - uses: michaelklishin/rust-build-package-release-action@v1
        id: build
        with:
          command: release-linux
          target: aarch64-unknown-linux-gnu
          locked: 'true'
          archive: 'true'
          pre-build: |
            sudo apt-get update && \
            sudo apt-get install -y libglib2.0-dev libgtk-3-dev libatk1.0-dev \
              libgdk-pixbuf2.0-dev libcairo2-dev libpango1.0-dev libwayland-dev pkg-config
      - name: Rename binary and archive
        run: |
          cd target/aarch64-unknown-linux-gnu/release
          ARCHIVE_NAME="${{ steps.archive_name.outputs.name }}"
          # Find original files
          ORIGINAL_TAR=$(ls *.tar.gz | grep -v "$ARCHIVE_NAME" | head -1)
          ORIGINAL_SHA=$(ls *.sha256 2>/dev/null | head -1)
          # For dev builds, extract, rename binary, and re-archive
          if [ "${{ needs.prepare.outputs.is_push_main }}" == "true" ]; then
            mkdir -p tmp && tar xzf "$ORIGINAL_TAR" -C tmp
            mv tmp/gamut "tmp/gamut-${{ needs.prepare.outputs.version }}-aarch64-unknown-linux-gnu"
            tar czf "$ARCHIVE_NAME" -C tmp .
            rm -rf tmp "$ORIGINAL_TAR"
          else
            mv "$ORIGINAL_TAR" "$ARCHIVE_NAME" 2>/dev/null || true
          fi
          # Clean up bare binary and rename checksum
          rm -f gamut gamut.d
          rm -f *.sha256 2>/dev/null || true
          sha256sum "$ARCHIVE_NAME" > "$ARCHIVE_NAME.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: aarch64-unknown-linux-gnu
          path: |
            target/aarch64-unknown-linux-gnu/release/*.tar.gz
            target/aarch64-unknown-linux-gnu/release/*.sha256

  release:
    needs: [prepare, build-x86_64, build-aarch64]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout specific commit
        if: ${{ needs.prepare.outputs.commit != '' }}
        run: git checkout ${{ needs.prepare.outputs.commit }}
      - name: Update Cargo.toml version for dev builds
        if: ${{ needs.prepare.outputs.is_push_main == 'true' }}
        run: |
          sed -i 's/^version = "[^"]*"/version = "${{ needs.prepare.outputs.version }}"/' Cargo.toml
          cargo update --workspace
      - name: Checkout default branch for changelog commit
        if: ${{ needs.prepare.outputs.is_push_main != 'true' }}
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          if [ -z "$DEFAULT_BRANCH" ]; then
            DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@' || true)
          fi
          if [ -z "$DEFAULT_BRANCH" ]; then
            DEFAULT_BRANCH="main"
          fi
          git checkout "$DEFAULT_BRANCH"
          git pull --ff-only origin "$DEFAULT_BRANCH"
      - name: Set up Ruby for changelog generation
        if: ${{ needs.prepare.outputs.is_push_main != 'true' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Install github-changelog-generator
        if: ${{ needs.prepare.outputs.is_push_main != 'true' }}
        run: gem install github_changelog_generator
      - name: Generate changelog
        if: ${{ needs.prepare.outputs.is_push_main != 'true' }}
        env:
          CHANGELOG_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY##*/}"
          TAG="${{ needs.prepare.outputs.tag }}"
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          EXTRA_ARGS=""
          if [ -n "$PREV_TAG" ]; then
            EXTRA_ARGS="--since-tag $PREV_TAG"
          fi
          github_changelog_generator \
            --user "$OWNER" \
            --project "$REPO" \
            --token "$CHANGELOG_GITHUB_TOKEN" \
            --future-release "$TAG" \
            $EXTRA_ARGS \
            --output CHANGELOG.md
      - name: Build release notes from git log
        if: ${{ needs.prepare.outputs.is_push_main != 'true' }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          BUILT_FROM="${{ needs.prepare.outputs.commit }}"
          if [ -z "$BUILT_FROM" ]; then
            BUILT_FROM="$(git rev-parse HEAD)"
          fi
          END_REF="$BUILT_FROM"
          if [ -n "$PREV_TAG" ] && git rev-parse -q --verify "refs/tags/$PREV_TAG" >/dev/null; then
            RANGE="refs/tags/$PREV_TAG..$END_REF"
          else
            RANGE="$END_REF"
          fi
          CHANGELOG_URL=""
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG_URL="https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
          else
            CHANGELOG_URL="https://github.com/${GITHUB_REPOSITORY}/commits/${END_REF}"
          fi
          VERSION="${{ needs.prepare.outputs.version }}"
          {
            echo "Full Changelog: ${CHANGELOG_URL}"
            echo ""
            echo "#### Changelog:"
            git log --no-merges --pretty="* %s (%h)" $RANGE
            echo ""
            echo "Built from ${BUILT_FROM}."
            if [[ "$VERSION" == 0.* ]]; then
              echo ""
              echo "#### Notes"
              echo "- This is an early, v0.x release: interfaces and behavior may change as the launcher evolves."
            fi
          } > release_notes.md
      - name: Update changelog section from git log
        if: ${{ needs.prepare.outputs.is_push_main != 'true' }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          END_REF="${GITHUB_SHA}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            END_REF="refs/tags/$TAG"
          fi
          if [ -n "$PREV_TAG" ] && git rev-parse -q --verify "refs/tags/$PREV_TAG" >/dev/null; then
            RANGE="refs/tags/$PREV_TAG..$END_REF"
          else
            RANGE="$END_REF"
          fi
          SECTION_FILE="$(mktemp)"
          {
            echo "## [$TAG] - $(date -u +%Y-%m-%d)"
            git log --no-merges --pretty="* %s (%h)" $RANGE
          } > "$SECTION_FILE"
          if [ -f CHANGELOG.md ]; then
            awk -v tag="[$TAG]" -v section_file="$SECTION_FILE" '
              function print_section() {
                while ((getline line < section_file) > 0) print line
                close(section_file)
              }
              $0 ~ /^## / && $0 ~ tag {
                found=1
                in_section=1
                print_section()
                next
              }
              $0 ~ /^## / && in_section { in_section=0 }
              !in_section { print }
              END {
                if (!found) {
                  print ""
                  print_section()
                }
              }
            ' CHANGELOG.md > CHANGELOG.new
            mv CHANGELOG.new CHANGELOG.md
          else
            cp "$SECTION_FILE" CHANGELOG.md
          fi
          rm -f "$SECTION_FILE"
      - name: Commit changelog
        if: ${{ needs.prepare.outputs.is_push_main != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git status --porcelain CHANGELOG.md | grep -q .; then
            DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
            if [ -z "$DEFAULT_BRANCH" ]; then
              DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD | sed 's@^refs/remotes/origin/@@' || true)
            fi
            if [ -z "$DEFAULT_BRANCH" ]; then
              DEFAULT_BRANCH="main"
            fi
            git add CHANGELOG.md
            git -c user.name="github-actions[bot]" \
                -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "Update CHANGELOG for ${{ needs.prepare.outputs.tag }}"
            git push origin HEAD:"$DEFAULT_BRANCH"
          else
            echo "No CHANGELOG.md changes to commit."
          fi
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release files
        run: |
          mkdir -p release
          echo "Artifacts directory contents:"
          ls -la artifacts/ || true
          find artifacts -type f -name '*.tar.gz' -exec cp {} release/ \;
          find artifacts -type f -name '*.sha256' -exec cp {} release/ \;
          echo "Release directory contents:"
          ls -la release/
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.title }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          body_path: ${{ github.workspace }}/release_notes.md
          files: release/*
        if: hashFiles('release_notes.md') != ''
      - name: Create GitHub release (no changelog)
        if: hashFiles('release_notes.md') == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.title }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          files: release/*
